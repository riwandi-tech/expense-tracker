<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <!-- Fonts & Icons -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <!-- App -->
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="app" id="app">
      <!-- Header -->
      <header class="app-header">
        <!-- Navbar -->
        <nav class="navbar">
          <div class="navbar-brand">
            <i class="ri-wallet-3-fill"></i>
            <span>Expense Tracker</span>
          </div>
          <div class="navbar-actions">
            <span class="current-month">Maret 2026</span>
            <button class="theme-toggle">
              <i class="ri-sun-line"></i>
            </button>
          </div>
        </nav>
      </header>
      <!-- Summary Bar -->
      <section class="summary-section">
        <div class="summary-card" id="balance-card">
          <span class="summary-label">Total Balance</span>
          <span class="summary-value" id="total-balance">Rp 0</span>
        </div>
        <div class="summary-card" id="income-card">
          <span class="summary-label">Total Pemasukan</span>
          <span class="summary-value" id="total-income">Rp 0</span>
        </div>
        <div class="summary-card" id="expense-card">
          <span class="summary-label">Total Pengeluaran</span>
          <span class="summary-value" id="total-expense">Rp 0</span>
        </div>
      </section>
      <!-- Middle -->
      <section class="middle-section">
        <div class="form-card">
          <h2 class="form-title">Tambah Transaksi</h2>
          <form id="transaction-form">
            <div class="form-group">
              <label for="input-nama">Nama Transaksi</label>
              <input
                type="text"
                id="input-nama"
                placeholder="contoh: Makan Siang"
              />
            </div>
            <div class="form-group">
              <label for="input-nominal">Nominal (Rp)</label>
              <input
                type="number"
                id="input-nominal"
                placeholder="contoh: 25000"
              />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="input-kategori">Kategori</label>
                <select id="input-kategori">
                  <option value="">Pilih Kategori</option>
                  <option value="Makan">Makan</option>
                  <option value="Transport">Transport</option>
                  <option value="Belanja">Belanja</option>
                  <option value="Hiburan">Hiburan</option>
                  <option value="Kesehatan">Kesehatan</option>
                  <option value="Pendidikan">Pendidikan</option>
                  <option value="Tagihan">Tagihan</option>
                  <option value="Tabungan">Tabungan</option>
                </select>
              </div>
              <div class="form-group">
                <label for="input-tipe">Tipe</label>
                <select id="input-tipe">
                  <option value="pengeluaran">Pengeluaran</option>
                  <option value="pemasukan">Pemasukan</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label for="input-tanggal">Tanggal</label>
              <input type="date" id="input-tanggal" />
            </div>
            <button type="submit" class="btn-submit">
              <i class="ri-add-line"></i>
              Tambah Transaksi
            </button>
          </form>
        </div>
        <div class="chart-card">
          <h2 class="chart-title">Pengeluaran Bulan Ini</h2>
          <canvas id="expense-chart"></canvas>
        </div>
      </section>
      <!-- Filter Bar -->
      <section class="filter-section">
        <div class="search-box">
          <i class="ri-search-line"></i>
          <input
            type="text"
            id="search-input"
            placeholder="Cari transaksi..."
          />
        </div>
        <select id="filter-kategori">
          <option value="all">Semua Kategori</option>
          <option value="Makan">Makan</option>
          <option value="Transport">Transport</option>
          <option value="Belanja">Belanja</option>
          <option value="Hiburan">Hiburan</option>
          <option value="Kesehatan">Kesehatan</option>
          <option value="Pendidikan">Pendidikan</option>
          <option value="Tagihan">Tagihan</option>
          <option value="Tabungan">Tabungan</option>
        </select>
        <select id="filter-bulan">
          <option value="all">Semua Bulan</option>
          <option value="1">Januari</option>
          <option value="2">Februari</option>
          <option value="3">Maret</option>
          <option value="4">April</option>
          <option value="5">Mei</option>
          <option value="6">Juni</option>
          <option value="7">Juli</option>
          <option value="8">Agustus</option>
          <option value="9">September</option>
          <option value="10">Oktober</option>
          <option value="11">November</option>
          <option value="12">Desember</option>
        </select>
      </section>
      <!-- Transaction List -->
      <section class="transaction-section">
        <div class="transaction-header">
          <h2 class="transaction-title">Transaksi</h2>
          <span class="transaction-count" id="transaction-count"
            >0 transaksi</span
          >
        </div>
        <ul class="transaction-list" id="transaction-list">
          <li class="transaction-empty">Belum ada transaksi</li>
        </ul>
      </section>
    </div>
  </body>
</html>
